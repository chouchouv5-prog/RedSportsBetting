<div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; overflow-y: auto;">
    <div style="background: white; color: black; padding: 30px; border-radius: 10px; width: 350px; margin: 20px;">
        <div style="display: flex; margin-bottom: 15px;">
            <button onclick="switchMode('login')" id="tab-login" style="flex: 1; padding: 10px; border: none; cursor: pointer; background: #1a0000; color: white; font-weight: bold;">Login</button>
            <button onclick="switchMode('signup')" id="tab-signup" style="flex: 1; padding: 10px; border: none; cursor: pointer; background: #eee; color: #333; font-weight: bold;">Sign Up</button>
        </div>

        <input id="email" type="email" placeholder="Email" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>
        <input id="password" type="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>

        <div id="signup-fields" style="display: none;">
            <input id="username" type="text" placeholder="Username" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>
            <input id="first_name" type="text" placeholder="First name" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>
            <input id="last_name" type="text" placeholder="Last name" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>
            <select id="gender" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">
                <option value="">Gender (optional)</option>
                <option value="male">♂️ Male</option>
                <option value="female">♀️ Female</option>
                <option value="other">⚧️ Other</option>
            </select><br>
        </div>

        <button id="submit-btn" onclick="signIn()" style="width: 100%; margin: 10px 0 5px 0; padding: 10px; background: #d4af37; border: none; cursor: pointer; font-weight: bold;">Login</button>
        <button onclick="closeModal()" style="width: 100%; margin-top: 10px; background: gray; color: white; border: none; padding: 10px; cursor: pointer;">Close</button>
    </div>
</div>

<script>
let authMode = 'login';

function switchMode(mode) {
    authMode = mode;
    const signupFields = document.getElementById('signup-fields');
    const submitBtn = document.getElementById('submit-btn');
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');

    if (mode === 'signup') {
        signupFields.style.display = 'block';
        submitBtn.textContent = 'Sign Up';
        submitBtn.onclick = signUp;
        tabSignup.style.background = '#1a0000';
        tabSignup.style.color = 'white';
        tabLogin.style.background = '#eee';
        tabLogin.style.color = '#333';
    } else {
        signupFields.style.display = 'none';
        submitBtn.textContent = 'Login';
        submitBtn.onclick = signIn;
        tabLogin.style.background = '#1a0000';
        tabLogin.style.color = 'white';
        tabSignup.style.background = '#eee';
        tabSignup.style.color = '#333';
    }
}

async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const username = document.getElementById('username').value;
    const first_name = document.getElementById('first_name').value;
    const last_name = document.getElementById('last_name').value;
    const gender = document.getElementById('gender').value;

    const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
            data: { username, first_name, last_name, gender }
        }
    });

    if (error) alert(error.message);
    else { alert("Account created!"); location.reload(); }
    closeModal();
}

async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
        alert("Incorrect email or password. Please check your details and try again.");
    } else {
        location.reload();
    }
}

function showAuthModal() {
    document.getElementById('auth-modal').style.display = 'flex';
    switchMode('login');
}

function closeModal() {
    document.getElementById('auth-modal').style.display = 'none';
}
</script>

<h3>My Recent Bets</h3>
<div id="profile-bets">Loading...</div>
<script>
async function loadProfile() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    const container = document.getElementById('profile-content');

    if (!user) {
        container.innerHTML = `<p>Please <a href="/">login</a> first.</p>`;
        document.getElementById('profile-bets').innerHTML = '';
        return;
    }

    const { data: profile } = await supabaseClient
        .from('profiles')
        .select('*')
        .eq('user_id', user.id)
        .single();

    const genderIcons = { male: '♂️', female: '♀️', other: '⚧️' };
    const genderIcon = profile && profile.gender ? genderIcons[profile.gender] || '' : '';
    const displayName = profile && profile.username ? profile.username : user.email.split('@')[0];

    container.innerHTML = `
        <div style="text-align:center; margin-bottom:15px;">${getAvatarHTML(displayName, 80)}</div>
        <p><strong>Email:</strong> ${user.email}</p>
        ${profile && profile.username ? `<p><strong>Username:</strong> ${profile.username}</p>` : ''}
        ${profile && (profile.first_name || profile.last_name) ? `<p><strong>Name:</strong> ${profile.first_name || ''} ${profile.last_name || ''} ${genderIcon}</p>` : ''}
        <p><strong>VSB Coins:</strong> <span style="color: gold; font-size: 1.8em;">${profile ? profile.vsb_coins : 1000}</span></p>
        <button onclick="logout()" style="padding: 12px 24px; background: #ff4444; color: white; border: none; border-radius: 5px; cursor: pointer;">Logout</button>
    `;

    loadRecentBets(user.id);
}

async function loadRecentBets(userId) {
    const betsContainer = document.getElementById('profile-bets');

    const { data: bets } = await supabaseClient
        .from('bets')
        .select('*, matches(team_home, team_away)')
        .eq('user_id', userId)
        .order('created_at', { ascending: false })
        .limit(5);

    if (!bets || bets.length === 0) {
        betsContainer.innerHTML = `<p>No bets yet. <a href="/matches/">Place your first bet!</a></p>`;
        return;
    }

    const statusLabels = { pending: '⏳ Pending', won: '💰 Won', won_paid: '💰 Won', lost: '❌ Lost' };
    const choiceLabels = { home: 'Home', draw: 'Draw', away: 'Away' };

    betsContainer.innerHTML = bets.map(b => `
        <div style="border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #f9f9f9;">
            <strong>${b.matches.team_home} vs ${b.matches.team_away}</strong><br>
            ${choiceLabels[b.choice]} — ${b.amount} coins — ${statusLabels[b.status] || b.status}
        </div>
    `).join('') + `<p><a href="/my-bets/">See all my bets →</a></p>`;
}

function logout() {
    supabaseClient.auth.signOut().then(() => location.href = "/");
}

function waitForSupabase(callback) {
    if (typeof supabaseClient !== 'undefined') {
        callback();
    } else {
        setTimeout(() => waitForSupabase(callback), 100);
    }
}
waitForSupabase(loadProfile);

<script>
    function getAvatarHTML(name, size) {
    const letter = (name || '?').charAt(0).toUpperCase();
    const colors = ['#d4af37', '#145214', '#8b0000', '#1a6b1a', '#ff8c00'];
    const colorIndex = letter.charCodeAt(0) % colors.length;
    const bgColor = colors[colorIndex];
    return `<span style="display:inline-flex; align-items:center; justify-content:center; width:${size}px; height:${size}px; border-radius:50%; background:${bgColor}; color:white; font-weight:bold; font-size:${size*0.5}px;">${letter}</span>`;
}
async function updateHeader() {
    const userSection = document.getElementById('user-section');
    if (!userSection) return;

    const { data: { user } } = await supabaseClient.auth.getUser();

    if (user) {
        const { data: profile } = await supabaseClient
            .from('profiles')
            .select('vsb_coins, username')
            .eq('user_id', user.id)
            .single();

        const coins = profile ? profile.vsb_coins : 0;
        const displayName = profile && profile.username ? profile.username : user.email.split('@')[0];

        userSection.innerHTML = `
    <a href="/profile/" style="display:flex; align-items:center; gap:8px; text-decoration:none;">
        ${getAvatarHTML(displayName, 30)}
        <span style="color: gold;">${displayName}</span>
    </a>
    <span style="color: #f2b705; font-weight: bold;">💰 ${coins}</span>
    <button onclick="logout()" style="padding: 8px 16px; background: #ff4444; color: white;">Logout</button>
`;
    } else {
        userSection.innerHTML = `<button onclick="showAuthModal()" style="padding: 8px 16px;">Sign Up / Login</button>`;
    }
}

function logout() {
    supabaseClient.auth.signOut().then(() => location.reload());
}

updateHeader();
</script>
