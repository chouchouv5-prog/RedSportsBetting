<div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; color: black; padding: 30px; border-radius: 10px; width: 350px;">
        <h2>Sign Up / Login</h2>
        <input id="email" type="email" placeholder="Email" style="width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;"><br>
        <input id="password" type="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;"><br>
        <button onclick="signUp()" style="width: 100%; margin: 5px 0; padding: 10px; background: #d4af37; border: none; cursor: pointer;">Sign Up</button>
        <button onclick="signIn()" style="width: 100%; margin: 5px 0; padding: 10px; background: #1a0000; color: white; border: none; cursor: pointer;">Login</button>
        <button onclick="closeModal()" style="width: 100%; margin-top: 10px; background: gray; color: white; border: none; padding: 10px; cursor: pointer;">Close</button>
    </div>
</div>

<script>
async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabaseClient.auth.signUp({ email, password });
    if (error) alert(error.message);
    else { alert("Account created!"); location.reload(); }
    closeModal();
}

async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
    else location.reload();
}

function showAuthModal() {
    document.getElementById('auth-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('auth-modal').style.display = 'none';
}
</script>

<script>
async function loadMyBets() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    const container = document.getElementById('bets-container');

    if (!user) {
        container.innerHTML = `<p>Please <a href="/">login</a> to see your bets.</p>`;
        return;
    }

    const { data: bets, error } = await supabaseClient
        .from('bets')
        .select('*, matches(team_home, team_away, match_date)')
        .eq('user_id', user.id)
        .order('created_at', { ascending: false });

    if (!bets || bets.length === 0) {
        container.innerHTML = "<p>You haven't placed any bets yet. <a href='/matches/'>See upcoming matches</a>.</p>";
        return;
    }

    const statusLabels = {
    pending: '⏳ Pending',
    won: '💰 Won',
    won_paid: '💰 Won',
    lost: '❌ Lost'
};

    const choiceLabels = {
        home: 'Home team',
        draw: 'Draw',
        away: 'Away team'
    };

    container.innerHTML = bets.map(b => `
        <div style="border: 2px solid #0b3d0b; border-radius: 10px; padding: 15px; margin-bottom: 12px; background: #f9f9f9;">
            <strong>${b.matches.team_home} vs ${b.matches.team_away}</strong><br>
            <span style="color: #555;">${new Date(b.matches.match_date).toLocaleString('en-GB')}</span><br>
            Bet: ${choiceLabels[b.choice]} — Amount: ${b.amount} coins — Odds: ${b.odds}<br>
            Status: <strong>${statusLabels[b.status] || b.status}</strong>
        </div>
    `).join('');
}

function waitForSupabase(callback) {
    if (typeof supabaseClient !== 'undefined') {
        callback();
    } else {
        setTimeout(() => waitForSupabase(callback), 100);
    }
}
waitForSupabase(loadMyBets);
</script><ul class="pa0">

<script>
async function updateHeader() {
    const userSection = document.getElementById('user-section');
    if (!userSection) return;

    const { data: { user } } = await supabaseClient.auth.getUser();

   if (user) {
    const { data: profile } = await supabaseClient
        .from('profiles')
        .select('vsb_coins')
        .eq('user_id', user.id)
        .single();

    const coins = profile ? profile.vsb_coins : 0;

    userSection.innerHTML = `
        <span style="color: gold;">${user.email.split('@')[0]}</span>
        <span style="color: #f2b705; font-weight: bold;">💰 ${coins}</span>
        <a href="/profile/" style="color: white; margin: 0 15px;">Profile</a>
        <button onclick="logout()" style="padding: 8px 16px; background: #ff4444; color: white;">Logout</button>
    `;
} else {
    userSection.innerHTML = `<button onclick="showAuthModal()" style="padding: 8px 16px;">Sign Up / Login</button>`;
}
}

function logout() {
    supabaseClient.auth.signOut().then(() => location.reload());
}

updateHeader();
</script>
