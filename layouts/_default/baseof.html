<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    
    <link rel="stylesheet" href="{{ .Site.BaseURL }}css/custom.css">
</head>
<body>
    {{ partial "header.html" . }}
    <main>
        {{ block "main" . }}{{ end }}
    </main>
</body>
<script>
async function updateHeader() {
    const userSection = document.getElementById('user-section');
    if (!userSection) return;

    const { data: { user } } = await supabaseClient.auth.getUser();

   if (user) {
    const { data: profile } = await supabaseClient
        .from('profiles')
        .select('vsb_coins')
        .eq('user_id', user.id)
        .single();

    const coins = profile ? profile.vsb_coins : 0;

    userSection.innerHTML = `
        <span style="color: gold;">${user.email.split('@')[0]}</span>
        <span style="color: #f2b705; font-weight: bold;">💰 ${coins}</span>
        <a href="/profile/" style="color: white; margin: 0 15px;">Profile</a>
        <button onclick="logout()" style="padding: 8px 16px; background: #ff4444; color: white;">Logout</button>
    `;
} else {
    userSection.innerHTML = `<button onclick="showAuthModal()" style="padding: 8px 16px;">Sign Up / Login</button>`;
}
}

function logout() {
    supabaseClient.auth.signOut().then(() => location.reload());
}

updateHeader();
</script>
</html>
