<header style="background: #1a0000; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #d4af37;">
    <h1 style="margin: 0;"><a href="/" style="color: white; text-decoration: none;">🔴 VSB1 - Virtual Sports Betting</a></h1>

    <div id="user-section" style="display: flex; align-items: center; gap: 15px;">
        <!-- Sera rempli par JavaScript -->
    </div>
</header>

<div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; color: black; padding: 30px; border-radius: 10px; width: 350px;">
        <h2>Sign Up / Login</h2>
        <input id="email" type="email" placeholder="Email" style="width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;"><br>
        <input id="password" type="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box;"><br>
        <button onclick="signUp()" style="width: 100%; margin: 5px 0; padding: 10px; background: #d4af37; border: none; cursor: pointer;">Sign Up</button>
        <button onclick="signIn()" style="width: 100%; margin: 5px 0; padding: 10px; background: #1a0000; color: white; border: none; cursor: pointer;">Login</button>
        <button onclick="closeModal()" style="width: 100%; margin-top: 10px; background: gray; color: white; border: none; padding: 10px; cursor: pointer;">Close</button>
    </div>
</div>

<script>
async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabaseClient.auth.signUp({ email, password });
    if (error) alert(error.message);
    else { alert("Compte créé !"); location.reload(); }
    closeModal();
}

async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
    else location.reload();
}

function showAuthModal() {
    document.getElementById('auth-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('auth-modal').style.display = 'none';
}
</script>
