<header style="background: #1a0000; color: white; padding: 15px 20px; border-bottom: 3px solid #d4af37; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 15px; row-gap: 10px;">
    <h1 style="margin: 0; font-size: 1.4em; white-space: nowrap;"><a href="/" style="color: white; text-decoration: none;">⚽ VSB1</a></h1>

    <nav style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
        <a href="/matches/" style="color: white; text-decoration: none; font-weight: 500;">Matches</a>
        <a href="/my-bets/" style="color: white; text-decoration: none; font-weight: 500;">My Bets</a>
        <a href="/leaderboard/" style="color: white; text-decoration: none; font-weight: 500;">Leaderboard</a>
        <a href="/results/" style="color: white; text-decoration: none; font-weight: 500;">Results</a>
        <a href="/news/" style="color: white; text-decoration: none; font-weight: 500;">News</a>
    </nav>

    <div id="user-section" style="display: flex; align-items: center; gap: 15px; margin-left: auto;">
        <!-- Sera rempli par JavaScript -->
    </div>
</header>

<div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; overflow-y: auto;">
    <div style="background: white; color: black; padding: 30px; border-radius: 10px; width: 350px; margin: 20px;">
        <h2>Sign Up / Login</h2>
        <input id="email" type="email" placeholder="Email" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>
        <input id="password" type="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>

        <p style="margin: 15px 0 5px 0; font-weight: bold; font-size: 0.9em;">Optional (for sign up):</p>
        <input id="username" type="text" placeholder="Username" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>
        <input id="first_name" type="text" placeholder="First name" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>
        <input id="last_name" type="text" placeholder="Last name" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;"><br>
        <select id="gender" style="width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box;">
            <option value="">Gender (optional)</option>
            <option value="male">♂️ Male</option>
            <option value="female">♀️ Female</option>
            <option value="other">⚧️ Other</option>
        </select><br>

        <button onclick="signUp()" style="width: 100%; margin: 10px 0 5px 0; padding: 10px; background: #d4af37; border: none; cursor: pointer;">Sign Up</button>
        <button onclick="signIn()" style="width: 100%; margin: 5px 0; padding: 10px; background: #1a0000; color: white; border: none; cursor: pointer;">Login</button>
        <button onclick="closeModal()" style="width: 100%; margin-top: 10px; background: gray; color: white; border: none; padding: 10px; cursor: pointer;">Close</button>
    </div>
</div>

<script>
async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const username = document.getElementById('username').value;
    const first_name = document.getElementById('first_name').value;
    const last_name = document.getElementById('last_name').value;
    const gender = document.getElementById('gender').value;

    const { data, error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
            data: { username, first_name, last_name, gender }
        }
    });

    if (error) alert(error.message);
    else { alert("Account created!"); location.reload(); }
    closeModal();
}

async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
    else location.reload();
}

function showAuthModal() {
    document.getElementById('auth-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('auth-modal').style.display = 'none';
}
</script>
