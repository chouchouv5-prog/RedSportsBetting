<header style="background: #000; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
    <h1 style="margin: 0;"><a href="/" style="color: white; text-decoration: none;">VSB1 - Virtual Sports Betting</a></h1>
    
    <div id="user-info" style="display: none; align-items: center; gap: 15px;">
        <span id="username-display" style="font-weight: bold;"></span>
        <span id="coins-display" style="color: gold; font-weight: bold; background: #333; padding: 5px 12px; border-radius: 20px;"></span>
    </div>

    <button onclick="showAuthModal()" id="auth-button" style="padding: 8px 16px;">Sign Up / Login</button>
</header>

<!-- Modal -->
<div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; color: black; padding: 30px; border-radius: 10px; width: 350px;">
        <h2>Sign Up / Login</h2>
        <input id="email" type="email" placeholder="Email" style="width: 100%; padding: 10px; margin: 10px 0;"><br>
        <input id="password" type="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0;"><br>
        <button onclick="signUp()" style="width: 100%; margin: 5px 0; padding: 10px;">Sign Up</button>
        <button onclick="signIn()" style="width: 100%; margin: 5px 0; padding: 10px;">Login</button>
        <button onclick="closeModal()" style="width: 100%; margin-top: 10px; background: gray; padding: 10px;">Close</button>
    </div>
</div>

<script>
async function loadUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (user) {
        document.getElementById('auth-button').style.display = 'none';
        document.getElementById('user-info').style.display = 'flex';
        document.getElementById('username-display').textContent = user.email.split('@')[0];
        
        // Load coins
        const { data } = await supabaseClient.from('profiles').select('vsb_coins').eq('email', user.email).single();
        if (data) {
            document.getElementById('coins-display').textContent = data.vsb_coins + ' Coins';
        }
    }
}

loadUser();
</script>
