<header style="background: #000; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
    <h1 style="margin: 0;"><a href="/" style="color: white; text-decoration: none;">VSB1 - Virtual Sports Betting</a></h1>
    
    <div id="user-info" style="display: none;">
        <span id="username-display"></span> | 
        <span id="coins-display" style="color: gold; font-weight: bold;"></span> VSB Coins
    </div>

    <div>
        <button onclick="showAuthModal()" style="margin-right: 10px; padding: 8px 16px;">Sign Up / Login</button>
    </div>
</header>

<!-- Modal de connexion simple -->
<div id="auth-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background: white; color: black; padding: 30px; border-radius: 10px; width: 350px;">
        <h2>Sign Up / Login</h2>
        <input id="email" type="email" placeholder="Email" style="width: 100%; padding: 10px; margin: 10px 0;"><br>
        <input id="password" type="password" placeholder="Password" style="width: 100%; padding: 10px; margin: 10px 0;"><br>
        <button onclick="signUp()" style="width: 100%; margin: 5px 0;">Sign Up</button>
        <button onclick="signIn()" style="width: 100%; margin: 5px 0;">Login</button>
        <button onclick="closeModal()" style="width: 100%; margin-top: 10px; background: gray;">Close</button>
    </div>
</div>

<script>
// Simple auth functions
async function signUp() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabaseClient.auth.signUp({ email, password });
    if (error) alert(error.message);
    else alert("Check your email to confirm!");
    closeModal();
}

async function signIn() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
    else location.reload();
}

function showAuthModal() {
    document.getElementById('auth-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('auth-modal').style.display = 'none';
}

// Load user info
supabaseClient.auth.onAuthStateChange((event, session) => {
    if (session) {
        document.getElementById('user-info').style.display = 'block';
        // Load coins later
    }
});
</script>
